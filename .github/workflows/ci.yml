name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-macos-arm64:
    name: Build and Test (macOS arm64 / iOS simulator arm64 / Swift)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build and test Apple arm64 targets
        run: >
          ./gradlew
          compileKotlinIosArm64
          compileKotlinIosSimulatorArm64
          compileKotlinMacosArm64
          iosSimulatorArm64Test
          macosArm64Test
          assembleMimeXCFramework
          -PenableIosSimulatorTests=true
          --no-configuration-cache

  build-linux:
    name: Build and Test (Linux / Android / JS / WASM) + CodeQL
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          check-latest: true

      - name: Set up Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Check JavaScript toolchain
        run: |
          node --version
          npm --version
          yarn --version

      - name: Initialize CodeQL (java-kotlin)
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      # Stop any daemon warmed by gradle/actions/setup-gradle before CodeQL
      # init exported LD_PRELOAD. A pre-existing daemon's child JVMs (including
      # the JavaExec subprocess that runs codeqlCompileJvm's kotlinc) inherit
      # the daemon's stale env and never see the tracer.
      - name: Stop pre-existing Gradle daemon
        run: ./gradlew --stop || true

      # codeqlCompileJvm runs kotlinc 2.3.20 against commonMain. The mainline
      # workspace is on Kotlin 2.3.21 whose multiplatform compile dispatches
      # through the new K2 phased pipeline that the CodeQL Java agent does
      # not yet hook. 2.3.20 still routes through K2JVMCompiler.doExecute
      # which the agent instruments at class load time, so the in-process
      # compile produces real Kotlin TRAP.
      #
      # --no-daemon: force a fresh single-use daemon JVM that inherits
      # LD_PRELOAD from this step's shell, so its JavaExec subprocess (the
      # kotlinc that codeqlCompileJvm forks) inherits it too.
      - name: Build and test Linux, Android, JS, and WASM targets (+ CodeQL extraction)
        env:
          ORG_GRADLE_PROJECT_kotlin_js_yarn_download: "false"
        run: >
          ./gradlew
          --no-daemon
          codeqlCompileJvm
          compileAndroidMain
          assembleUnitTest
          assembleAndroidTest
          jsBrowserTest
          jsNodeTest
          linuxX64Test
          wasmJsBrowserTest
          wasmJsNodeTest
          --no-configuration-cache

      # Analyze runs even if the gradle test step failed: the CodeQL extractor
      # ran during codeqlCompileJvm (which comes first in the task list) and the
      # database is populated before any test task can fail.
      - name: Perform CodeQL Analysis (java-kotlin)
        if: ${{ !cancelled() }}
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"

  codeql-source-only:
    name: CodeQL (JS/TS + Actions)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL (source-only languages)
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript, actions
          build-mode: none

      - name: Perform CodeQL Analysis (source-only)
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript-actions"

  build-windows:
    name: Build and Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build and test Windows target
        run: ./gradlew mingwX64Test --no-configuration-cache
