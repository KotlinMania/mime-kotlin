name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# This workflow builds and tests on macOS, Linux, and Windows hosts. It does
# not run CodeQL. CodeQL jobs live in .github/workflows/codeql.yml so that a
# CodeQL extraction issue is reported separately from a test failure, and
# the Code Scanning UI configuration stays bound to a stable file path.
#
# Each step inside a job runs a single gradle task. Splitting the monolithic
# "build and test" step into one step per task means a failure on (e.g.)
# jsBrowserTest shows up in the CI UI as a red step labeled "Test (JS
# browser)" rather than buried inside a long combined log, and re-runs can
# target a specific failing step.
#
# Branch trigger is `main` only. The previous shape `[main, master]` would
# fire CI on any branch literally named `master`, which is a workflow-content
# trust escalation — a branch with that name controls its own workflow file
# and runs with whatever permissions are granted at job level. The workspace
# standardizes on `main`; `master` is not a legitimate branch name here.

jobs:
  build-macos-arm64:
    name: Build and Test (macOS arm64 / iOS simulator arm64 / Swift)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Compile Kotlin (iOS arm64)
        run: ./gradlew compileKotlinIosArm64 --no-configuration-cache

      - name: Compile Kotlin (iOS simulator arm64)
        run: ./gradlew compileKotlinIosSimulatorArm64 --no-configuration-cache

      - name: Compile Kotlin (macOS arm64)
        run: ./gradlew compileKotlinMacosArm64 --no-configuration-cache

      - name: Test (iOS simulator arm64)
        run: ./gradlew iosSimulatorArm64Test -PenableIosSimulatorTests=true --no-configuration-cache

      - name: Test (macOS arm64)
        run: ./gradlew macosArm64Test --no-configuration-cache

      - name: Assemble Mime XCFramework
        run: ./gradlew assembleMimeXCFramework --no-configuration-cache

  build-linux:
    name: Build and Test (Linux / Android / JS / WASM)
    runs-on: ubuntu-latest

    env:
      ORG_GRADLE_PROJECT_kotlin_js_yarn_download: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          check-latest: true

      - name: Set up Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Check JavaScript toolchain
        run: |
          node --version
          npm --version
          yarn --version

      - name: Compile Android main
        run: ./gradlew compileAndroidMain --no-configuration-cache

      - name: Assemble Android unit test
        run: ./gradlew assembleUnitTest --no-configuration-cache

      - name: Assemble Android device test
        run: ./gradlew assembleAndroidTest --no-configuration-cache

      - name: Test (JS browser)
        run: ./gradlew jsBrowserTest --no-configuration-cache

      - name: Test (JS Node)
        run: ./gradlew jsNodeTest --no-configuration-cache

      - name: Test (Linux x64)
        run: ./gradlew linuxX64Test --no-configuration-cache

      - name: Test (WASM JS browser)
        run: ./gradlew wasmJsBrowserTest --no-configuration-cache

      - name: Test (WASM JS Node)
        run: ./gradlew wasmJsNodeTest --no-configuration-cache

  build-windows:
    name: Build and Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Test (Windows mingw x64)
        run: ./gradlew mingwX64Test --no-configuration-cache
