name: CodeQL

# CodeQL config for KotlinMania repos.
#
# `java-kotlin` runs in `manual` build mode using the
# `com.android.kotlin.multiplatform.library` Android target. The Android
# KMP target is the one compilation that produces real JVM `.class` files
# (under `build/classes/kotlin/android/main`), which is exactly what the
# CodeQL Kotlin extractor's LD_PRELOAD tracer hooks. `autobuild` and
# `build-mode: none` both fail on strict-KMP repos with no JVM target â€”
# the extractor exits with "could not process any code written in
# Java/Kotlin". Verified green on starlark-syntax-kotlin#30.
#
# `actions` covers workflow files; `javascript-typescript` covers any
# JS/TS in the repo.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.build-mode == 'manual'
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: "21"

      - name: Setup Gradle
        if: matrix.build-mode == 'manual'
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Compile every Kotlin target for CodeQL extraction
        if: matrix.build-mode == 'manual'
        shell: bash
        # `compileAndroidMain` emits real JVM `.class` files under
        # `build/classes/kotlin/android/main` via the
        # `com.android.kotlin.multiplatform.library` plugin â€” the JVM
        # `kotlinc` exec is exactly what the CodeQL Kotlin extractor's
        # LD_PRELOAD tracer hooks. `compileKotlinJs` and
        # `compileKotlinWasmJs` are listed on the chance that the tracer
        # also matches the K/JS and K/WASM compilers, in which case jsMain
        # and wasmJsMain sources land in the database too.
        #
        # `--rerun-tasks --no-build-cache` defeats Gradle's up-to-date
        # check and the cache hits restored by setup-gradle so kotlinc is
        # actually invoked. `--no-configuration-cache --no-daemon` are
        # belt-and-braces for the same property: every gradle invocation
        # = new JVM = new traceable exec.
        #
        # `kotlin.compiler.execution.strategy=out-of-process` spawns a
        # fresh kotlinc JVM per compilation; the LD_PRELOAD tracer hooks
        # new process execs, so out-of-process gives it something to
        # intercept (the default `daemon` strategy reuses long-lived JVMs
        # the tracer wasn't around for).
        run: |
          ./gradlew \
            compileAndroidMain \
            compileKotlinJs \
            compileKotlinWasmJs \
            --rerun-tasks \
            --no-build-cache \
            -Pkotlin.compiler.execution.strategy=out-of-process \
            --no-configuration-cache \
            --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
